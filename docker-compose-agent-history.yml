version: '3.8'

# Agent History stack — run on each VM
# API + collector on the main VM, collector-only on others
#
# Usage:
#   docker-compose -f docker-compose-agent-history.yml up -d

services:
  # Central API server (only needed on one VM)
  agent-history-api:
    build:
      context: ./agent-history-service
      dockerfile: Dockerfile
    container_name: agent-history-api
    environment:
      - PORT=5002
      - HOST=0.0.0.0
      - DORIS_HOST=10.1.0.7
      - DORIS_PORT=9030
      - DORIS_USER=root
      - DORIS_PASSWORD=
      - DORIS_DATABASE=agent_history
    ports:
      - "5002:5002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  # Collector for this VM (10.1.0.9 / dev-vm)
  agent-history-collector:
    build:
      context: ./agent-history-collector
      dockerfile: Dockerfile
    container_name: agent-history-collector
    environment:
      - VM_ID=dev-vm
      - API_URL=http://agent-history-api:5002
      - CLAUDE_HOME=/data/.claude
      - CODEX_HOME=/data/.codex
      - SYNC_INTERVAL_MS=300000
      - DATA_DIR=/data/.agent-history-collector
    volumes:
      - /home/cslog/.claude:/data/.claude:ro
      - /home/cslog/.codex:/data/.codex:ro
      - collector-data:/data/.agent-history-collector
    depends_on:
      agent-history-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  collector-data:
