services:
  # React frontend - exposed on port 80
  terminal-dashboard:
    build:
      context: ./terminal-dashboard
      dockerfile: Dockerfile
    container_name: ai-workflow-dashboard
    ports:
      - "80:3000"  # Expose dashboard on port 80 (Nginx Proxy Manager will forward here)
    networks:
      - ai-workflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # TMux session management API - exposed on port 5001
  tmux-session-service:
    build:
      context: ./tmux-session-service
      dockerfile: Dockerfile
    container_name: ai-workflow-tmux-service
    environment:
      - PORT=5001
      - HOST=0.0.0.0
      - LANG=pt_BR.UTF-8
      - LC_ALL=pt_BR.UTF-8
      - TERM=xterm-256color
      - MOBILE_SELF_HOST_ID=${MOBILE_SELF_HOST_ID:-vm10}
      - MOBILE_WORKSPACES_CONFIG=${MOBILE_WORKSPACES_CONFIG:-/home/cslog/ai-workflow/workspace-v2/catalog/workspaces.v2.json}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - DEEPGRAM_STT_MODEL=${DEEPGRAM_STT_MODEL:-nova-3}
      - DEEPGRAM_STT_LANGUAGE=${DEEPGRAM_STT_LANGUAGE:-pt-BR}
      - DEEPGRAM_TTS_MODEL=${DEEPGRAM_TTS_MODEL:-aura-2-thalia-en}
      - DEEPGRAM_TTS_ENCODING=${DEEPGRAM_TTS_ENCODING:-mp3}
    volumes:
      # Persist session data
      - tmux-session-data:/app/data
      # Mount host's tmux socket directory to connect to host tmux sessions
      - /tmp/tmux-1000:/tmp/tmux-1000
      # Mount host's home directory so sessions have access to host environment
      - /home/cslog:/home/cslog
    ports:
      - "5001:5001"  # Expose API on port 5001 (for WebSocket and REST API)
    networks:
      - ai-workflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  ai-workflow-network:
    driver: bridge

volumes:
  tmux-session-data:
    driver: local
